name: Weekly Meta Update

on:
  # 毎週金曜 21:00 JST = 12:00 UTC
  schedule:
    - cron: "0 12 * * 5"
  # 手動実行用
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run update script
        run: node scripts/update-meta.mjs

      - name: Commit & push if changed
        run: |
          if git diff --quiet data.json; then
            echo "No changes to data.json"
            exit 0
          fi
          git config user.name "md-meta-bot"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "chore(data): weekly meta update $(date -u +%Y-%m-%d)"
          git push
